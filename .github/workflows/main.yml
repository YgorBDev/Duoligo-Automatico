name: Duolingo Streak Maintainer

on:
  schedule:
    - cron: '0 3 * * *' # Roda todo dia às 00:00 (Horário de Brasília aprox, dependendo do UTC)
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  run-streak:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Duolingo Script
      env:
        DUO_USERNAME: ${{ secrets.DUO_USERNAME }}
        DUO_PASSWORD: ${{ secrets.DUO_PASSWORD }}
      run: python streak.py

    - name: Upload Screenshots (if failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: "*.png"
